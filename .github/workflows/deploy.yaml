name: Deploy

on:
    push:
        branches:
            - main

concurrency:
    group: deploy
    cancel-in-progress: true

jobs:
    deploy:
        name: Deploy
        runs-on: ubuntu-latest
        steps:
            -
                name: Check out the repo
                uses: actions/checkout@v4
    
            - 
                name: Login to Docker Hub
                uses: docker/login-action@v3
                with:
                    username: ${{ secrets.DOCKER_USERNAME }}
                    password: ${{ secrets.DOCKER_PASSWORD }}

            -
                name: Set environment variables
                run: |
                    rm -rf .env
                    echo "DEV_TO_API_KEY=${{ secrets.DEV_TO_API_KEY }}" >> .env

            -
                name: Build docker image
                run: |
                    docker build . --build-arg DEV_TO_API_KEY=${{ secrets.DEV_TO_API_KEY }} -t iamthewraith/wraithcode:latest -t iamthewraith/wraithcode:${{ github.sha }}
            
            -
                name: Push docker image
                run: |
                    docker push iamthewraith/wraithcode:latest
                    docker push iamthewraith/wraithcode:${{ github.sha }}  

            -
                name: Copy files to VPS
                uses: appleboy/scp-action@v1
                with:
                    host: ${{ secrets.SSH_HOST }}
                    username: ${{ secrets.SSH_USERNAME }}
                    key: ${{ secrets.SSH_KEY }}
                    port: ${{ secrets.SSH_PORT }}
                    source: "docker-compose.yml,.env"
                    target: ${{ secrets.SSH_TARGET }}

            -
                name: Deploy to VPS
                uses: appleboy/ssh-action@v1
                with:
                    host: ${{ secrets.SSH_HOST }}
                    username: ${{ secrets.SSH_USERNAME }}
                    key: ${{ secrets.SSH_KEY }}
                    port: ${{ secrets.SSH_PORT }}
                    script: |
                        cd ${{ secrets.SSH_TARGET }}
                        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
                        docker compose down --remove-orphans
                        docker compose pull
                        docker compose up -d
                        docker image prune -f